openapi: 3.0.3
info:
  title: LandIt API
  description: LandIt 智能求职助手 API 接口文档
  version: 1.0.0
  contact:
    name: Azir

servers:
  - url: http://localhost:8080
    description: 开发环境

tags:
  - name: user
    description: 用户管理
  - name: resumes
    description: 简历管理
  - name: interviews
    description: 面试管理
  - name: reviews
    description: 复盘管理
  - name: statistics
    description: 数据统计
  - name: jobs
    description: 职位推荐

paths:
  # ==================== 用户模块 ====================
  /api/user/profile:
    get:
      tags:
        - user
      summary: 获取当前用户信息
      operationId: getUserProfile
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_User'
    put:
      tags:
        - user
      summary: 更新用户信息
      operationId: updateUserProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_User'

  /api/user/avatar:
    post:
      tags:
        - user
      summary: 上传头像
      operationId: uploadAvatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AvatarUpload'

  # ==================== 简历模块 ====================
  /api/resumes:
    get:
      tags:
        - resumes
      summary: 获取简历列表
      operationId: getResumes
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ResumeStatus'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ResumeList'
    post:
      tags:
        - resumes
      summary: 创建空白简历
      operationId: createResume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResumeRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Resume'

  /api/resumes/upload:
    post:
      tags:
        - resumes
      summary: 上传简历文件
      operationId: uploadResume
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ResumeDetail'

  /api/resumes/{id}:
    get:
      tags:
        - resumes
      summary: 获取简历详情
      operationId: getResumeDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ResumeDetail'
    put:
      tags:
        - resumes
      summary: 更新简历
      operationId: updateResume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResumeRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ResumeDetail'
    delete:
      tags:
        - resumes
      summary: 删除简历
      operationId: deleteResume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'

  /api/resumes/{id}/primary:
    put:
      tags:
        - resumes
      summary: 设置主简历
      operationId: setPrimaryResume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'

  /api/resumes/{id}/suggestions:
    get:
      tags:
        - resumes
      summary: 获取优化建议
      operationId: getResumeSuggestions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ResumeSuggestionList'

  /api/resumes/{id}/suggestions/{suggestionId}/apply:
    post:
      tags:
        - resumes
      summary: 应用优化建议
      operationId: applyResumeSuggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: suggestionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ResumeDetail'

  /api/resumes/{id}/optimize:
    post:
      tags:
        - resumes
      summary: AI优化简历
      operationId: optimizeResume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizeResumeRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_OptimizeResume'

  /api/resumes/{id}/export:
    get:
      tags:
        - resumes
      summary: 导出简历PDF
      operationId: exportResume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # ==================== 面试模块 ====================
  /api/interviews/sessions:
    post:
      tags:
        - interviews
      summary: 开始面试会话
      operationId: startInterviewSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_StartSession'

  /api/interviews/sessions/{sessionId}/answers:
    post:
      tags:
        - interviews
      summary: 提交回答
      operationId: submitAnswer
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SubmitAnswer'

  /api/interviews/sessions/{sessionId}/hints:
    get:
      tags:
        - interviews
      summary: 请求提示
      operationId: getHint
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: questionId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Hint'

  /api/interviews/sessions/{sessionId}/finish:
    post:
      tags:
        - interviews
      summary: 结束面试
      operationId: finishInterview
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinishSessionRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_FinishSession'

  /api/interviews/history:
    get:
      tags:
        - interviews
      summary: 获取面试历史
      operationId: getInterviewHistory
      parameters:
        - name: type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/InterviewType'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_InterviewHistoryPage'

  /api/interviews/{id}:
    get:
      tags:
        - interviews
      summary: 获取面试详情
      operationId: getInterviewDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_InterviewDetail'

  /api/interviews/questions:
    get:
      tags:
        - interviews
      summary: 获取题库
      operationId: getInterviewQuestions
      parameters:
        - name: type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/InterviewType'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_InterviewQuestions'

  # ==================== 复盘模块 ====================
  /api/reviews:
    get:
      tags:
        - reviews
      summary: 获取复盘列表
      operationId: getReviews
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ReviewListPage'

  /api/reviews/{id}:
    get:
      tags:
        - reviews
      summary: 获取复盘详情
      operationId: getReviewDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_InterviewReview'

  /api/reviews/{id}/export:
    get:
      tags:
        - reviews
      summary: 导出复盘报告
      operationId: exportReview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # ==================== 统计模块 ====================
  /api/statistics:
    get:
      tags:
        - statistics
      summary: 获取统计数据
      operationId: getStatistics
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Statistics'

  # ==================== 职位推荐模块 ====================
  /api/jobs/recommendations:
    get:
      tags:
        - jobs
      summary: 获取推荐职位
      operationId: getJobRecommendations
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_JobListPage'

components:
  schemas:
    # ==================== 枚举类型 ====================
    ResumeStatus:
      type: string
      enum:
        - optimized
        - draft

    SuggestionType:
      type: string
      enum:
        - critical
        - improvement
        - enhancement

    InterviewType:
      type: string
      enum:
        - technical
        - behavioral

    InterviewStatus:
      type: string
      enum:
        - completed
        - in_progress

    QuestionDifficulty:
      type: string
      enum:
        - easy
        - medium
        - hard

    ConversationRole:
      type: string
      enum:
        - interviewer
        - candidate

    ActivityType:
      type: string
      enum:
        - interview
        - resume
        - practice
        - review

    # ==================== 用户相关 ====================
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatar:
          type: string
          nullable: true
        email:
          type: string
        phone:
          type: string
        targetPosition:
          type: string
        targetSalary:
          type: string
        experience:
          type: string
        education:
          type: string
        skills:
          type: array
          items:
            type: string
        createdAt:
          type: string

    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        targetPosition:
          type: string
        targetSalary:
          type: string
        skills:
          type: array
          items:
            type: string

    AvatarUploadResponse:
      type: object
      properties:
        avatarUrl:
          type: string

    # ==================== 简历相关 ====================
    Resume:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        targetPosition:
          type: string
        updatedAt:
          type: string
        status:
          $ref: '#/components/schemas/ResumeStatus'
        score:
          type: integer
        completeness:
          type: integer
        isPrimary:
          type: boolean

    ResumeSection:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        content:
          type: object
        score:
          type: integer
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/ResumeSuggestionItem'

    ResumeSuggestionItem:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/SuggestionType'
        content:
          type: string

    ResumeDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        targetPosition:
          type: string
        sections:
          type: array
          items:
            $ref: '#/components/schemas/ResumeSection'
        overallScore:
          type: integer
        keywordMatch:
          type: integer
        formatScore:
          type: integer
        contentScore:
          type: integer

    ResumeSuggestion:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/SuggestionType'
        category:
          type: string
        title:
          type: string
        description:
          type: string
        impact:
          type: string
        position:
          type: string

    CreateResumeRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        targetPosition:
          type: string

    UpdateResumeRequest:
      type: object
      properties:
        name:
          type: string
        sections:
          type: array
          items:
            $ref: '#/components/schemas/ResumeSection'

    OptimizeResumeRequest:
      type: object
      properties:
        targetPosition:
          type: string

    OptimizeResumeResponse:
      type: object
      properties:
        optimizedResume:
          $ref: '#/components/schemas/ResumeDetail'
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/ResumeSuggestion'

    # ==================== 面试相关 ====================
    Interview:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/InterviewType'
        position:
          type: string
        company:
          type: string
        date:
          type: string
        duration:
          type: integer
        score:
          type: integer
        status:
          $ref: '#/components/schemas/InterviewStatus'
        questions:
          type: integer
        correctAnswers:
          type: integer

    InterviewQuestion:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        difficulty:
          $ref: '#/components/schemas/QuestionDifficulty'
        question:
          type: string
        followUp:
          type: string
        keyPoints:
          type: array
          items:
            type: string
        sampleAnswer:
          type: string

    InterviewQuestions:
      type: object
      properties:
        technical:
          type: array
          items:
            $ref: '#/components/schemas/InterviewQuestion'
        behavioral:
          type: array
          items:
            $ref: '#/components/schemas/InterviewQuestion'

    Conversation:
      type: object
      properties:
        id:
          type: string
        role:
          $ref: '#/components/schemas/ConversationRole'
        content:
          type: string
        timestamp:
          type: string
        score:
          type: integer
        feedback:
          type: string

    InterviewAnalysis:
      type: object
      properties:
        strengths:
          type: array
          items:
            type: string
        weaknesses:
          type: array
          items:
            type: string
        overallFeedback:
          type: string

    InterviewDetail:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/InterviewType'
        position:
          type: string
        company:
          type: string
        date:
          type: string
        duration:
          type: integer
        score:
          type: integer
        conversation:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
        analysis:
          $ref: '#/components/schemas/InterviewAnalysis'

    StartSessionRequest:
      type: object
      required:
        - type
        - position
      properties:
        type:
          $ref: '#/components/schemas/InterviewType'
        position:
          type: string
        difficulty:
          $ref: '#/components/schemas/QuestionDifficulty'
        questionCount:
          type: integer

    SessionQuestion:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        keyPoints:
          type: array
          items:
            type: string

    StartSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
        firstQuestion:
          $ref: '#/components/schemas/SessionQuestion'

    SubmitAnswerRequest:
      type: object
      required:
        - questionId
        - answer
      properties:
        questionId:
          type: string
        answer:
          type: string
        timestamp:
          type: string

    SubmitAnswerResponse:
      type: object
      properties:
        score:
          type: integer
        feedback:
          type: string
        nextQuestion:
          $ref: '#/components/schemas/SessionQuestion'
        isFollowUp:
          type: boolean
        finished:
          type: boolean

    HintResponse:
      type: object
      properties:
        hint:
          type: string
        keyPoints:
          type: array
          items:
            type: string

    FinishSessionRequest:
      type: object
      properties:
        duration:
          type: integer

    FinishSessionResponse:
      type: object
      properties:
        interviewId:
          type: string
        reviewId:
          type: string
        overallScore:
          type: integer

    # ==================== 复盘相关 ====================
    ReviewDimension:
      type: object
      properties:
        name:
          type: string
        score:
          type: integer
        maxScore:
          type: integer
        feedback:
          type: string

    QuestionAnalysis:
      type: object
      properties:
        question:
          type: string
        yourAnswer:
          type: string
        score:
          type: integer
        keyPointsCovered:
          type: array
          items:
            type: string
        keyPointsMissed:
          type: array
          items:
            type: string
        suggestion:
          type: string

    ImprovementPlan:
      type: object
      properties:
        category:
          type: string
        items:
          type: array
          items:
            type: string

    InterviewReview:
      type: object
      properties:
        id:
          type: string
        interviewId:
          type: string
        overallScore:
          type: integer
        analysis:
          $ref: '#/components/schemas/InterviewAnalysis'
        dimensions:
          type: array
          items:
            $ref: '#/components/schemas/ReviewDimension'
        questionAnalysis:
          type: array
          items:
            $ref: '#/components/schemas/QuestionAnalysis'
        improvementPlan:
          type: array
          items:
            $ref: '#/components/schemas/ImprovementPlan'

    ReviewListItem:
      type: object
      properties:
        id:
          type: string
        interviewId:
          type: string
        overallScore:
          type: integer
        date:
          type: string

    # ==================== 统计相关 ====================
    StatisticsOverview:
      type: object
      properties:
        totalInterviews:
          type: integer
        averageScore:
          type: integer
        improvementRate:
          type: integer
        studyHours:
          type: integer

    WeeklyProgress:
      type: object
      properties:
        week:
          type: string
        score:
          type: integer
        interviews:
          type: integer

    SkillRadar:
      type: object
      properties:
        skill:
          type: string
        score:
          type: integer

    RecentActivity:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ActivityType'
        content:
          type: string
        time:
          type: string
        score:
          type: integer
          nullable: true

    Statistics:
      type: object
      properties:
        overview:
          $ref: '#/components/schemas/StatisticsOverview'
        weeklyProgress:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyProgress'
        skillRadar:
          type: array
          items:
            $ref: '#/components/schemas/SkillRadar'
        recentActivity:
          type: array
          items:
            $ref: '#/components/schemas/RecentActivity'

    # ==================== 职位相关 ====================
    Job:
      type: object
      properties:
        id:
          type: string
        company:
          type: string
        companyLogo:
          type: string
          nullable: true
        position:
          type: string
        salary:
          type: string
        location:
          type: string
        experience:
          type: string
        education:
          type: string
        tags:
          type: array
          items:
            type: string
        matchScore:
          type: integer
        publishedAt:
          type: string
        description:
          type: string

    # ==================== 分页相关 ====================
    PageResponse:
      type: object
      properties:
        list:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer
        pages:
          type: integer

    # ==================== 通用响应 ====================
    ApiResponse_Void:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        timestamp:
          type: integer
          format: int64

    ApiResponse_User:
      type: object
