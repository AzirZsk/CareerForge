server:
  port: 8080
  servlet:
    context-path: /careerforge

spring:
  application:
    name: careerforge-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/careerforge.db
    # SQLite 不需要用户名密码
  # Spring AI OpenAI 配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${AI_MODEL:gpt-4o}
          temperature: 0.7

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      column-format: "\"%s\""  # SQLite 字段名加引号防止关键字冲突
  configuration:
    map-underscore-to-camel-case: true
#    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    jdbc-type-for-null: NULL  # SQLite 处理 NULL 值

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# JWT 配置
careerforge:
  jwt:
    # JWT 密钥（生产环境必须配置环境变量，开发环境使用默认值）
    secret: ${JWT_SECRET:careerforge-dev-secret-key-for-jwt-token-generation-2026}
    # Token 过期时间（毫秒），默认 2 小时
    expire: 7200000

# 语音服务配置
  voice:
    provider: aliyun  # aliyun, openai, azure（启动时确定，不支持运行时切换）

    aliyun:
      api-key: ${ALIYUN_API_KEY:}
      asr:
        model: paraformer-realtime-v2
        format: pcm
        sample-rate: 16000
        enable-punctuation: true
        enable-itn: true
        language: zh
        enable-vad: true
      tts:
        model: qwen3-tts-flash-realtime
        format: wav
        sample-rate: 16000
      voices:
        interviewer: Cherry
        assistant: Cherry

# 日志配置 - 打印 AI 请求详情
logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: debug
    com.careerforge.**.mapper: info