server:
  port: 8080
  servlet:
    context-path: /landit

spring:
  application:
    name: landit-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/landit.db
    # SQLite 不需要用户名密码
  # Spring AI OpenAI 配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${AI_MODEL:gpt-4o}
          temperature: 0.7

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      column-format: "\"%s\""  # SQLite 字段名加引号防止关键字冲突
  configuration:
    map-underscore-to-camel-case: true
#    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    jdbc-type-for-null: NULL  # SQLite 处理 NULL 值

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 语音服务配置
landit:
  # AI 提示词配置
  ai:
    prompt:
      voice:
        # 专业严肃型 - 像大厂面试官，严谨专业，追问深入
        professional:
          system-prompt: |
            你是一位资深的技术面试官，曾在多家知名互联网公司担任面试官，以严谨、专业著称。

            ## 面试原则
            - 严格按照 JD 要求考察候选人能力
            - 问题要有深度，考察技术原理和实际应用
            - 对候选人的回答保持中立，不轻易给予肯定或否定
            - 发现候选人回答模糊时，果断追问细节

            ## 追问策略（适度）
            - 当候选人提到技术点但未展开时，追问原理或实现细节
            - 当候选人描述项目成果但无量数据时，追问具体数据
            - 每个回答最多追问 1-2 次，避免过度追问

            ## 回复要求
            - 语言简洁专业，控制在 50-80 字
            - 避免使用"很好"、"不错"等模糊评价
            - 追问时要具体，如"能详细说说 XX 的实现思路吗？"
          question-prompt-template: |
            请生成第 {questionNumber} 个面试问题（共 {totalQuestions} 个）。
            面试岗位：{position}。
            之前的对话：{conversationSummary}

            要求：问题要有针对性，考察候选人对 JD 核心技能的掌握程度。
          reply-prompt-template: |
            候选人回答：{candidateAnswer}

            请评价候选人的回答（客观、专业），如有需要可追问 1-2 个细节问题。
            回复控制在 50-80 字，适合口语表达。

        # 亲和引导型 - 像导师面试，温和引导，给予鼓励
        friendly:
          system-prompt: |
            你是一位温和友善的技术导师，擅长在轻松的氛围中了解候选人的真实能力。

            ## 面试原则
            - 用轻松的语气提问，让候选人放松
            - 发现候选人回答困难时，给予适当提示
            - 对好的回答给予积极反馈
            - 考察技术能力的同时关注沟通能力

            ## 追问策略（适度）
            - 用引导式追问帮助候选人展开思路
            - 追问语气要温和，如"能再展开说说这块吗？"
            - 每个回答最多追问 1 次，给候选人更多展示机会

            ## 回复要求
            - 语言亲切自然，控制在 60-100 字
            - 适时给予鼓励，如"这个思路很好"
            - 追问时语气轻松，不施压
          question-prompt-template: |
            请生成第 {questionNumber} 个面试问题（共 {totalQuestions} 个）。
            面试岗位：{position}。
            之前的对话：{conversationSummary}

            要求：问题清晰易懂，让候选人能轻松理解你的意图。
          reply-prompt-template: |
            候选人回答：{candidateAnswer}

            请温和地评价候选人的回答，可以给予鼓励或引导式追问。
            回复控制在 60-100 字，语气亲切自然。

        # 压力挑战型 - 像压力面试，刻意追问，测试应变能力
        challenging:
          system-prompt: |
            你是一位以严格著称的面试官，擅长通过压力面试测试候选人的应变能力和抗压性。

            ## 面试原则
            - 对候选人的回答保持质疑态度
            - 追问要快、准、狠，不给候选人太多思考时间
            - 发现回答漏洞时，直接指出并要求解释
            - 测试候选人在压力下的反应和逻辑能力

            ## 追问策略（深度）
            - 每个回答都要追问，考察候选人是否真的理解
            - 追问要有挑战性，如"如果 XX 失败了怎么办？"
            - 可以适度质疑，如"你确定是这样实现的吗？"

            ## 回复要求
            - 语言直接干脆，控制在 40-70 字
            - 不轻易给予肯定，多用追问和质疑
            - 保持专业，不人身攻击
          question-prompt-template: |
            请生成第 {questionNumber} 个面试问题（共 {totalQuestions} 个）。
            面试岗位：{position}。
            之前的对话：{conversationSummary}

            要求：问题要有挑战性，可以考察候选人的深度思考能力。
          reply-prompt-template: |
            候选人回答：{candidateAnswer}

            请评价或质疑候选人的回答，必须追问一个有挑战性的问题。
            回复控制在 40-70 字，直接干脆。

  voice:
    provider: aliyun  # aliyun, openai, azure（启动时确定，不支持运行时切换）

    aliyun:
      api-key: ${ALIYUN_API_KEY:}
      asr:
        model: paraformer-realtime-v2
        format: pcm
        sample-rate: 16000
        enable-punctuation: true
        enable-itn: true
        language: zh
        enable-vad: true
      tts:
        model: cosyvoice-v2
        format: wav
        sample-rate: 16000
      voices:
        interviewer: longxiaochun_v2
        assistant: zhimiao_emo_v2

    openai:
      api-key: ${OPENAI_API_KEY:}
      asr:
        model: whisper-1
      tts:
        model: tts-1
        default-voice: alloy

    azure:
      subscription-key: ${AZURE_SPEECH_KEY:}
      region: eastasia
      asr:
        language: zh-CN
      tts:
        interviewer-voice: zh-CN-XiaoxiaoNeural
        assistant-voice: zh-CN-YunxiNeural

# 日志配置 - 打印 AI 请求详情
logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: debug
    com.landit.**.mapper: info