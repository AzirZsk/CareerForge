# =====================================================
# CareerForge Docker Compose 配置
# 单镜像双服务：Nginx（前端） + Spring Boot（后端）
# @author Azir
# =====================================================

services:
  careerforge:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: careerforge
    restart: unless-stopped
    ports:
      - "80:80"          # Nginx（前端）
      # - "8080:8080"   # 后端端口（可选，内部通信，不建议暴露）
    environment:
      # ==================== AI 服务配置 ====================
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com}
      - AI_MODEL=${AI_MODEL:-gpt-4o}
      # ==================== 阿里云语音服务 ====================
      - ALIYUN_API_KEY=${ALIYUN_API_KEY}
      # ==================== JWT 认证 ====================
      - JWT_SECRET=${JWT_SECRET:-careerforge-dev-secret-key-for-jwt-token-generation-2026}
      # ==================== JVM 参数 ====================
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      # 持久化数据库文件
      - ./backend/data:/app/data
      # 查看日志（可选）
      # - ./logs:/var/log/nginx
      # - ./logs:/var/log/supervisor
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ && wget -q --spider http://localhost:80/careerforge/swagger-ui.html || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
