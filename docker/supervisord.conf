# =====================================================
# LandIt Supervisor 配置
# 管理双服务：Nginx + Spring Boot
# @author Azir
# =====================================================

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/var/log/supervisor
; supervisord 以 root 运行，才能管理需要绑定特权端口的 nginx
user=root

; 后端服务
[program:backend]
command=java -server -Xmx512m -Xms256m \
           -XX:+UseContainerSupport \
           -XX:MaxRAMPercentage=75.0 \
           -XX:InitialRAMPercentage=50.0 \
           -XX:+UseG1GC \
           -Djava.security.egd=file:/dev/./urandom \
           -jar /app/app.jar
directory=/app
; backend 以 app 用户运行（不需要特权端口）
user=app
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/supervisor/backend.err.log
stdout_logfile=/var/log/supervisor/backend.out.log
stopsignal=TERM
stopwaitsec=30
priority=1
; 确保环境变量传递给 backend
environment=HOME="/home/app",USER="app"

; 前端服务
[program:nginx]
command=nginx -g 'daemon off;'
; nginx 需要 root 权限才能绑定 80 端口（特权端口）
user=root
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/supervisor/nginx.err.log
stdout_logfile=/var/log/supervisor/nginx.out.log
stopsignal=QUIT
stopwaitsec=5
priority=2
